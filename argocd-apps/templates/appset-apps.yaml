apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.env }}-apps-onboarding
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/vedantaggrawal/repo-app-gitops.git
        revision: main
        directories:
          - path: 'apps/*/{{ .Values.env }}'
  template:
    metadata:
      name: '{{ .Values.env }}-{{ "{{path[1]}}" }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/vedantaggrawal/repo-helm-chart.git
          path: .
          targetRevision: HEAD
          helm:
            valueFiles:
              - $values/apps/{{ "{{path[1]}}" }}/{{ .Values.env }}/values.yaml
        - repoURL: https://github.com/vedantaggrawal/repo-app-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: {{ .Values.cluster }}
        namespace: '{{ "{{path[1]}}" }}'
      syncPolicy:
        automated:
          prune: {{ .Values.prune }}
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m
