apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vedantaggrawal/repo-platform-gitops.git
    targetRevision: HEAD
    path: argocd-apps
    helm:
      parameters:
        - name: env
          value: prod
        - name: cluster
          value: https://kubernetes.default.svc
        - name: prune
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
