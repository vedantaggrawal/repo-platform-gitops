apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: webserver-l7-visibility
  namespace: devops-test-webserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: generic-app
  ingress:
    - toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - {}
