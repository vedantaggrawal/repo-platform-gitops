replicas: 1

# Console output as JSON so Loki's | json parser unpacks msg/level/logger.
grafana.ini:
  log:
    mode: console
    level: info
  log.console:
    format: json

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ServiceAccount with Service access so Loki and Mimir resolve via DNS works
# the same; no special perms needed for the standalone Grafana.
serviceAccount:
  create: true

# Sidecar auto-discovers ConfigMaps with grafana_datasource=1 or
# grafana_dashboard=1 in any namespace. Other apps (e.g. Cilium) drop
# dashboard ConfigMaps with the right label and they show up automatically.
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
  datasources:
    # Datasources are provisioned statically below, so sidecar discovery is
    # off. With searchNamespace: ALL it imported the dev kube-prometheus-stack
    # `grafana_datasource=1` ConfigMap (Prometheus isDefault:true) from the
    # shared monitoring namespace, colliding with our Mimir default and
    # crashing Grafana ("Only one datasource per organization can be default").
    enabled: false

# LGTM datasources: Mimir (metrics, default), Loki (logs), Tempo (traces).
# Cross-source jumps: Loki → Tempo via TraceID in log lines; Tempo →
# Loki via service.name; Tempo → Mimir for metrics on the same service.
# Standalone grafana chart wants the provisioning-file format here (the
# kube-prom-stack-only `additionalDataSources` key was silently ignored).
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        isDefault: true
        access: proxy
        url: http://local-mimir-nginx.monitoring.svc.cluster.local/prometheus
        jsonData:
          httpHeaderName1: X-Scope-OrgID
          timeInterval: 30s
        secureJsonData:
          httpHeaderValue1: anonymous
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://local-loki-gateway.monitoring.svc.cluster.local
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"(\w+)"'
              url: '$${__value.raw}'
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://local-tempo.monitoring.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-5m'
            spanEndTimeShift: '5m'
            tags: [{ key: service.name, value: service_name }]
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: mimir
            tags: [{ key: service.name, value: service }]
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true

ingress:
  enabled: true
  ingressClassName: cilium
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  hosts:
    - local.grafana.internal
  tls:
    - secretName: grafana-tls
      hosts:
        - local.grafana.internal

# Standalone chart doesn't ship a ServiceMonitor by default — Alloy now
# scrapes Grafana via explicit prometheus.scrape, so leave SM off.
serviceMonitor:
  enabled: false
