# Jellyfin — official community Helm chart
# https://github.com/jellyfin/jellyfin-helm

image:
  repository: docker.io/jellyfin/jellyfin
  pullPolicy: IfNotPresent

# Persist everything on the kind node via local-path-provisioner.
persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    storageClass: standard
    size: 5Gi
  cache:
    enabled: true
    type: pvc
    accessMode: ReadWriteOnce
    storageClass: standard
    size: 5Gi
  media:
    enabled: true
    type: pvc
    accessMode: ReadWriteOnce
    storageClass: standard
    size: 20Gi

service:
  type: ClusterIP
  port: 8096

ingress:
  enabled: true
  className: cilium
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  hosts:
    - host: local.jellyfin.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: jellyfin-tls
      hosts:
        - local.jellyfin.internal

# Run as non-root with a stable UID; fsGroup makes PVCs writable.
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

jellyfin:
  env:
    - name: JELLYFIN_PublishedServerUrl
      value: https://local.jellyfin.internal:10443
    - name: JELLYFIN_CACHE_DIR
      value: /cache
    - name: TZ
      value: Europe/Amsterdam
