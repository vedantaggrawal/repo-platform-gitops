# Local kind cluster — minimal resource footprint
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

grafana:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  ingress:
    enabled: true
    ingressClassName: cilium
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    hosts:
      - local.grafana.internal
    tls:
      - secretName: grafana-tls
        hosts:
          - local.grafana.internal
