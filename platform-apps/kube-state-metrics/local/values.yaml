# Default port :8080 named "http" — Alloy targets svc:8080 via explicit
# discovery.kubernetes endpoints role + relabel filter.
replicas: 1

# JSON logs to keep Loki's | json clean.
extraArgs:
  - --logtostderr=true

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

prometheus:
  monitor:
    # ServiceMonitor: discovered by Alloy's prometheus.operator.servicemonitors
    # block. CRDs come from the prometheus-operator-crds app (no controller).
    enabled: true
