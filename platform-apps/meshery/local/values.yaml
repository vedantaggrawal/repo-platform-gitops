replicaCount: 1

image:
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9081

env:
  EVENT: mesheryLocal
  PROVIDER_BASE_URLS: "https://cloud.layer5.io"

ingress:
  enabled: true
  ingressClassName: cilium
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  hosts:
    - host: local.meshery.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: meshery-tls
      hosts:
        - local.meshery.internal

rbac:
  nodes: false
