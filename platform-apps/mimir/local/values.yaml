# Mimir — Prometheus-compatible TSDB.
# Local: monolithic single-replica + S3 (MinIO). Prod: switch deploymentMode to
# microservices-mode without touching mimir.structuredConfig.

deploymentMode: monolithic-mode

mimir:
  structuredConfig:
    multitenancy_enabled: false
    common:
      storage:
        backend: s3
        s3:
          endpoint: local-minio.monitoring-storage.svc.cluster.local:9000
          access_key_id: lgtm-admin
          secret_access_key: lgtm-admin-local
          insecure: true
          region: us-east-1
    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-blocks
    ruler_storage:
      backend: s3
      s3:
        bucket_name: mimir-ruler
    alertmanager_storage:
      backend: s3
      s3:
        bucket_name: mimir-alertmanager
    compactor:
      data_dir: /data
      sharding_ring:
        kvstore:
          store: memberlist
    limits:
      compactor_blocks_retention_period: 30d
      ingestion_rate: 100000
      ingestion_burst_size: 200000
    server:
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600

monolithic:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1500Mi
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: standard

# Gateway in front of monolithic for Prometheus-compatible push/query routing.
nginx:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Disable all microservices-mode components (chart still renders empty templates).
distributor: { replicas: 0 }
ingester: { replicas: 0 }
querier: { replicas: 0 }
query_frontend: { replicas: 0 }
query_scheduler: { replicas: 0 }
store_gateway: { replicas: 0 }
compactor: { replicas: 0 }
ruler: { replicas: 0 }
alertmanager: { enabled: false }

# Disable bundled MinIO — we use platform-apps/minio.
minio:
  enabled: false

# Disable bundled Grafana stack pieces — we have our own kube-prom Grafana.
grafana-agent-operator:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false
