# Mimir — Prometheus-compatible TSDB.
# Chart only ships microservices mode. For local we collapse each role
# to a single replica with minimal resources; same chart scales out by
# bumping replicas per component for prod (the structuredConfig is unchanged).

mimir:
  structuredConfig:
    server:
      log_format: json
    multitenancy_enabled: false
    common:
      storage:
        backend: s3
        s3:
          endpoint: local-minio.monitoring-storage.svc.cluster.local:9000
          access_key_id: lgtm-admin
          secret_access_key: lgtm-admin-local
          insecure: true
          region: us-east-1
    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-blocks
    ruler_storage:
      backend: s3
      s3:
        bucket_name: mimir-ruler
    alertmanager_storage:
      backend: s3
      s3:
        bucket_name: mimir-alertmanager
    limits:
      compactor_blocks_retention_period: 30d
      ingestion_rate: 100000
      ingestion_burst_size: 200000
    # Single-replica ingester + store-gateway: drop the ring replication
    # factor from the default 3, otherwise queries fail with
    # "too many unhealthy instances in the ring".
    ingester:
      ring:
        replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1

global:
  extraEnvFrom: []

# Resource floor used everywhere we don't override per-component.
_resourcesSmall: &resourcesSmall
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

alertmanager:
  enabled: false

distributor:
  replicas: 1
  resources: *resourcesSmall

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 5Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi

querier:
  replicas: 1
  resources: *resourcesSmall

query_frontend:
  replicas: 1
  resources: *resourcesSmall

query_scheduler:
  replicas: 1
  resources: *resourcesSmall

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 2Gi
    storageClass: standard
  resources: *resourcesSmall

compactor:
  replicas: 1
  persistentVolume:
    size: 2Gi
    storageClass: standard
  resources: *resourcesSmall

ruler:
  enabled: false

overrides_exporter:
  enabled: false

gateway:
  replicas: 1
  resources: *resourcesSmall

# HA helper — needed only when ingesters have ≥2 zones; we run one zone.
rollout_operator:
  enabled: false

# Bundled MinIO/Memcached/metaMonitoring all disabled — we own those layers.
minio:
  enabled: false
memcached:
  enabled: false
memcachedExporter:
  enabled: false
metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false
