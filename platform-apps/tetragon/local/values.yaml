# Tetragon — eBPF runtime security & L7 observability (sidecar-free)
# Reference: https://tetragon.io/docs/installation/helm/

tetragon:
  enabled: true
  # Stream events as JSON to stdout for `kubectl logs` consumption.
  # Switch to gRPC export (port 54321) when wiring to Hubble/OTEL.
  exportFilename: tetragon.log
  exportFileMaxSizeMB: 50
  exportFileRotationInterval: 30m
  exportFileMaxBackups: 3
  # Enrich events with k8s pod/container/namespace metadata.
  enableK8sAPI: true
  enableProcessCred: true
  enableProcessNs: true
  # Resource floor for local kind — Tetragon agent + BTF parsing.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

tetragonOperator:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Operator installs/manages TracingPolicy CRDs.
  skipCRDCreation: false

# Prometheus metrics for Tetragon agent.
serviceMonitor:
  enabled: true
